name: Main Url Collector

on:
  workflow_dispatch:
    inputs:
      start_page:
        description: "Start page number"
        required: false
        default: "1"
      end_page:
        description: "End page number"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main_url_collector.py ${{ github.event.inputs.start_page }} ${{ github.event.inputs.end_page }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: movies-json-${{ github.run_number }}
          path: |
            *.json
            page_already_processed.txt
          retention-days: 30

      - name: Commit and push JSON and Tracker files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tell git to track both the json files AND the processed pages text file
          git add *.json page_already_processed.txt
          
          git diff --cached --quiet && echo "No changes to commit" || \
          git commit -m "chore: update movies json and tracking file [pages ${{ github.event.inputs.start_page }}-${{ github.event.inputs.end_page }}] [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
