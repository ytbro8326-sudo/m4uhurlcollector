name: M4UHD URL Scraper

on:
  workflow_dispatch:
    inputs:
      start_page:
        description: "Start page number"
        required: false
        default: "1"
      end_page:
        description: "End page number"
        required: false
        default: "5"

permissions:
  contents: write        # ← this fixes the 403 push error

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py ${{ github.event.inputs.start_page }} ${{ github.event.inputs.end_page }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: movies-json-${{ github.run_number }}
          path: "*.json"
          retention-days: 30

      - name: Commit and push JSON files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --cached --quiet && echo "No changes to commit" || \
          git commit -m "chore: update movies json [pages ${{ github.event.inputs.start_page }}-${{ github.event.inputs.end_page }}] [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
